version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-sj_emp_comp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sj_emp_comp"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    command: python main.py
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      - db
    volumes:
      - ./data:/app/data

  streamlit:
    build: .
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "8501:8501"
    depends_on:
      - db
      - etl
    restart: unless-stopped

volumes:
  pgdata:
